<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Alsalaymeh Group</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />  <link rel="stylesheet" href="/assets/css/fonts.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body data-page="404">
  <div class="nf-wrap">
    <div>
      <div class="nf-code grad-text">404</div>
      <h1 data-i18n="nf_title">This block isn't placed yet.</h1>
      <p data-i18n="nf_sub">The page you're looking for hasn't been built — but we know people who build things.</p>
      <a class="btn btn-gold" href="/" data-i18n="nf_home">Back to Home</a>
    </div>
  </div>
  <script src="/assets/js/i18n.js"></script>
  <script>
    (function () {
      var lang = localStorage.getItem("asg-lang") || "en";
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      document.documentElement.dataset.theme = localStorage.getItem("asg-theme") || "dark";
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        var v = (I18N[lang] || I18N.en)[el.dataset.i18n];
        if (v) el.textContent = v;
      });
    })();
  </script>
</body>
</html>
